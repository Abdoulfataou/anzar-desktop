version: '3.8'

services:
  anzar-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anzar-backend
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=https://api.deepseek.com/v1
      - DEEPSEEK_MODEL=deepseek-chat
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - DATABASE_PATH=/app/data/anzar.db
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data
      - ./projects:/app/projects
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
