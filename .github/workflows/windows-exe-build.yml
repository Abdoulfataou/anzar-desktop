name: Build Windows EXE (Tauri)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  # Anticipe le passage de GitHub Actions à Node.js 24 (warning non bloquant sinon)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer (NSIS .exe)
        run: npm run tauri:build -- --bundles nsis

      - name: Upload artifact (NSIS)
        uses: actions/upload-artifact@v4
        with:
          name: anzar-windows-nsis
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/nsis/*.zip
          if-no-files-found: error
