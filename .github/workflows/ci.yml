name: CI

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  desktop:
    name: Desktop (lint/build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck (lint)
        run: npm run lint

      - name: Build (Vite)
        run: npm run build

